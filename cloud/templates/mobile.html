<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{ app_window_title or name or 'Tremplin' }}">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon/{{ meet_id }}">
    <link rel="manifest" href="/manifest/{{ meet_id }}">
    <title>{{ app_window_title or name or 'Tremplin' }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

        iframe {
            position: fixed;
            top: env(safe-area-inset-top); left: 0;
            width: 100%;
            height: calc(100% - 65px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            border: none; display: none;
        }
        iframe.active { display: block; }

        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(65px + env(safe-area-inset-bottom));
            display: flex; background: #111; border-top: 1px solid #333;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
        }
        nav button {
            flex: 1; background: none; border: none; color: #666;
            font-size: 15px; font-family: -apple-system, sans-serif;
            cursor: pointer; transition: color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        nav button.active { color: #fff; border-top: 2px solid #fff; margin-top: -1px; }
        nav a.nav-back {
            flex: 0 0 52px;
            display: flex; align-items: center; justify-content: center;
            color: #555; text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.15s;
        }
        nav a.nav-back:active { color: #ccc; }
        nav a.nav-back svg { display: block; }

        .edge {
            position: fixed; top: env(safe-area-inset-top); width: 28px;
            height: calc(100% - 65px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            z-index: 10;
        }
        .edge-left  { left: 0; }
        .edge-right { right: 0; }
        /*
         * Pull-to-refresh capture zone. Covers the top-left area of the screen.
         *   height: calc(65px + env(safe-area-inset-top))
         *              — the iframes start at env(safe-area-inset-top), so this makes
         *                the overlay cover exactly the 65px tab-header zone inside each
         *                iframe, no more.
         *   right: 110px — leaves the top-right corner free so the Schedule filter
         *                button (positioned at the right of #top-bar) is tappable.
         *
         * Consequences for schedule.html:
         *   • #filter-btn must stay within the right 110px (it does — it's at the end of #top-bar).
         *   • #filter-header row 1 height = 65px so that the search box, the ✓ close
         *     button, and all buttons below land in row 2 — outside this overlay zone.
         *
         * If you change the tab-header height (65px) or right offset (110px), update
         * both this rule and grid-template-rows in schedule.html's #filter-header.
         */
        #edgeT { position: fixed; top: 0; left: 0; right: 110px; height: calc(65px + env(safe-area-inset-top)); width: auto; z-index: 10; }
        #ptr-wrap {
            position: fixed; top: env(safe-area-inset-top); left: 0; right: 0;
            height: 0; overflow: visible; z-index: 11; pointer-events: none;
        }
        #ptr-indicator {
            position: absolute; top: -44px; left: 50%;
            transform: translateX(-50%);
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.75); font-size: 20px; line-height: 1;
            opacity: 0;
        }

        @media (orientation: portrait) and (max-width: 480px) {
            nav button { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; }
            nav button img { margin-right: 0 !important; }
            .tab-label { display: block; }
        }
        @media (orientation: landscape) and (max-height: 480px) {
            .tab-label { display: none; }
            nav button img { margin-right: 0 !important; }
            iframe { left: env(safe-area-inset-left); width: calc(100% - env(safe-area-inset-left) - env(safe-area-inset-right)); }
            .edge-left  { left:  env(safe-area-inset-left); }
            .edge-right { right: env(safe-area-inset-right); }
        }
    </style>
</head>
<body>
    <iframe id="frame0" class="active" src="/mobile/live?meet={{ meet_id }}"></iframe>
    <iframe id="frame1"               src="/mobile/results?meet={{ meet_id }}"></iframe>
    <iframe id="frame2"               src="/mobile/schedule?meet={{ meet_id }}"></iframe>

    <div class="edge edge-left"  id="edgeL"></div>
    <div class="edge edge-right" id="edgeR"></div>
    <div id="edgeT"></div>
    <div id="ptr-wrap"><div id="ptr-indicator">↻</div></div>

    <nav>
        <a href="/" class="nav-back" aria-label="{{ t.back_to_meets or 'Meets' }}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <button class="active" id="tab0" onclick="show(0)">
            <img src="/static/icons/swimming.svg" style="width:22px;height:22px;filter:invert(1);vertical-align:middle;margin-right:5px;">
            <span class="tab-label">{{ t.scoreboard }}</span>
        </button>
        <button id="tab1" onclick="show(1)">
            <img src="/static/icons/award.svg" style="width:22px;height:22px;filter:invert(1);vertical-align:middle;margin-right:5px;">
            <span class="tab-label">{{ t.results }}</span>
        </button>
        <button id="tab2" onclick="show(2)">
            <img src="/static/icons/clipboard-list.svg" style="width:22px;height:22px;filter:invert(1);vertical-align:middle;margin-right:5px;">
            <span class="tab-label">{{ t.schedule }}</span>
        </button>
    </nav>

    <script>
        // ── Tab navigation ────────────────────────────────────────────────────
        const frames = [0,1,2].map(i => document.getElementById('frame' + i));
        const tabs   = [0,1,2].map(i => document.getElementById('tab'   + i));
        let current = 0;
        function show(idx) {
            if (idx === current) return;
            frames[current].classList.remove('active');
            tabs[current].classList.remove('active');
            current = idx;
            frames[current].classList.add('active');
            tabs[current].classList.add('active');
            sessionStorage.setItem('tab', idx);
            try { frames[current].contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
            try { frames[current].contentWindow.on_timer(); } catch(e) {}
            try { frames[current].contentWindow.on_tab_shown(); } catch(e) {}
        }
        (function() {
            const saved = parseInt(sessionStorage.getItem('tab'), 10);
            if (saved > 0 && saved <= 2) {
                frames[0].classList.remove('active');
                tabs[0].classList.remove('active');
                current = saved;
                frames[saved].classList.add('active');
                tabs[saved].classList.add('active');
            }
        })();
        let swipeStartX = null;
        function onTouchStart(e) { swipeStartX = e.touches[0].clientX; }
        function onTouchEnd(e) {
            if (swipeStartX === null) return;
            const dx = e.changedTouches[0].clientX - swipeStartX;
            swipeStartX = null;
            if (Math.abs(dx) < 40) return;
            show(dx < 0 ? Math.min(current + 1, 2) : Math.max(current - 1, 0));
        }
        ['edgeL','edgeR'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', onTouchStart, { passive: true });
            el.addEventListener('touchend',   onTouchEnd,   { passive: true });
        });

        // ── Pull to refresh ───────────────────────────────────────────────
        const ptr      = document.getElementById('ptr-indicator');
        const PTR_DIST = 80;
        let ptrY = null;

        function ptrReset(animate) {
            if (animate) {
                ptr.style.transition = 'top 0.25s, opacity 0.25s';
                setTimeout(() => { ptr.style.transition = ''; }, 250);
            }
            ptr.style.top       = '-44px';
            ptr.style.opacity   = '0';
            ptr.style.transform = 'translateX(-50%) rotate(0deg)';
            ptr.style.background = 'rgba(255,255,255,0.12)';
        }

        document.getElementById('edgeT').addEventListener('touchstart', e => {
            ptrY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            if (ptrY === null) return;
            const dy = e.touches[0].clientY - ptrY;
            if (dy < 0) { ptrY = null; ptrReset(false); return; }
            const progress = Math.min(dy / PTR_DIST, 1);
            ptr.style.top        = Math.min(dy * 0.65 - 44, 8) + 'px';
            ptr.style.opacity    = Math.min(progress * 1.5, 1);
            ptr.style.transform  = `translateX(-50%) rotate(${progress * 270}deg)`;
            ptr.style.background = progress >= 1 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.12)';
        }, { passive: true });

        document.addEventListener('touchend', e => {
            if (ptrY === null) return;
            const dy = e.changedTouches[0].clientY - ptrY;
            ptrY = null;
            if (dy >= PTR_DIST) { location.reload(); }
            else                { ptrReset(true); }
        }, { passive: true });
    </script>
</body>
</html>
