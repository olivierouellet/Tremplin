<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Scoreboard Preview</title>
<link rel="stylesheet" href="../static/css/timing_display.css">
</head>
<body style="margin:0;">

<div class="timing-outer">

    <!-- Header bar -->
    <div class="timing-header-bar">
        <div class="header_cell header_cell_grow" id="header_meet_title_wrap">
            <span class="header_value" id="header_meet_title">Championnat provincial 2025</span>
        </div>
        <div class="header_cell" id="header_event_cell" style="display:none;">
            <span class="header_label">ÉPREUVE</span>
            <span class="header_value" id="current_event">1</span>
        </div>
        <div class="header_cell" id="header_heat_cell" style="display:none;">
            <span class="header_label">SÉRIE</span>
            <span class="header_value" id="current_heat">1</span>
        </div>
        <div class="header_cell header_cell_name" id="header_name_cell" style="display:none;">
            <span class="header_value" id="event_name">100 m libre  —  Filles &lt; 10</span>
        </div>
        <div class="header_cell">
            <span class="header_value" id="meet_datetime"></span>
        </div>
    </div>

    <!-- Scoreboard table -->
    <div class="timing-content" id="scoreboard" style="opacity:0;">
        <table class="timing-table">
            <thead>
                <tr class="timing-header">
                    <th align="center" class="lane-column">CL</th>
                    <th align="left" id="name-column">NOM</th>
                    <th align="left" class="club-column">CLUB</th>
                    <th align="center" id="time-column" class="time-column timing-anim">TEMPS</th>
                    <th align="center" id="delta-column" class="delta-column timing-anim">ÉCART</th>
                    <th align="center" id="place-column" class="place-column timing-anim">POS</th>
                </tr>
            </thead>
            <tbody>
                <tr class="timing-row-odd"><td align="center">1</td><td id="lane_name1">Tremblay Sophie</td><td id="lane_club1" align="left">AQUA</td><td class="td_time" align="right"><span id="lane_time1"></span>&nbsp;</td><td class="td_delta" id="lane_delta1" align="right"></td><td id="lane_place1" align="center"></td></tr>
                <tr class="timing-row-even"><td align="center">2</td><td id="lane_name2">Gagnon Emma</td><td id="lane_club2" align="left">CAMO</td><td class="td_time" align="right"><span id="lane_time2"></span>&nbsp;</td><td class="td_delta" id="lane_delta2" align="right"></td><td id="lane_place2" align="center"></td></tr>
                <tr class="timing-row-odd"><td align="center">3</td><td id="lane_name3">Roy Julie</td><td id="lane_club3" align="left">AVAN</td><td class="td_time" align="right"><span id="lane_time3"></span>&nbsp;</td><td class="td_delta" id="lane_delta3" align="right"></td><td id="lane_place3" align="center"></td></tr>
                <tr class="timing-row-even"><td align="center">4</td><td id="lane_name4">Côté Marie</td><td id="lane_club4" align="left">CNQ</td><td class="td_time" align="right"><span id="lane_time4"></span>&nbsp;</td><td class="td_delta" id="lane_delta4" align="right"></td><td id="lane_place4" align="center"></td></tr>
                <tr class="timing-row-odd"><td align="center">5</td><td id="lane_name5">Bouchard Léa</td><td id="lane_club5" align="left">CNCB</td><td class="td_time" align="right"><span id="lane_time5"></span>&nbsp;</td><td class="td_delta" id="lane_delta5" align="right"></td><td id="lane_place5" align="center"></td></tr>
                <tr class="timing-row-even"><td align="center">6</td><td id="lane_name6">Leblanc Camille</td><td id="lane_club6" align="left">CAMO</td><td class="td_time" align="right"><span id="lane_time6"></span>&nbsp;</td><td class="td_delta" id="lane_delta6" align="right"></td><td id="lane_place6" align="center"></td></tr>
                <tr class="timing-row-odd"><td align="center">7</td><td id="lane_name7">Fortin Sarah</td><td id="lane_club7" align="left">AVAN</td><td class="td_time" align="right"><span id="lane_time7"></span>&nbsp;</td><td class="td_delta" id="lane_delta7" align="right"></td><td id="lane_place7" align="center"></td></tr>
                <tr class="timing-row-even"><td align="center">8</td><td id="lane_name8">Lavoie Océane</td><td id="lane_club8" align="left">CNQ</td><td class="td_time" align="right"><span id="lane_time8"></span>&nbsp;</td><td class="td_delta" id="lane_delta8" align="right"></td><td id="lane_place8" align="center"></td></tr>
            </tbody>
        </table>
    </div>

</div>
<div class="background"></div>

<script>
var FINISH_TIMES  = {1:'1:02.34',2:'1:00.87',3:'0:58.21',4:'0:59.45',5:'1:01.12',6:'0:57.63',7:'1:03.55',8:'0:58.99'};
var SEED_TIMES    = {1:'1:01.50',2:'1:01.20',3:'0:59.00',4:'0:59.00',5:'1:01.50',6:'0:58.50',7:'1:02.00',8:'0:59.50'};
var FINISH_ORDER  = [6,3,8,4,2,5,1,7];
var PLACES = {};
FINISH_ORDER.forEach(function(lane,i){ PLACES[lane]=i+1; });

function parseHundredths(s) {
    var m = s.match(/^(?:(\d+):)?(\d{1,2})\.(\d{2})$/);
    if (!m) return null;
    var val = (m[1] ? parseInt(m[1]) : 0) * 6000 + parseInt(m[2]) * 100 + parseInt(m[3]);
    return val > 0 ? val : null;
}
function formatDelta(finishStr, seedStr) {
    var finish = parseHundredths(finishStr), seed = parseHundredths(seedStr);
    if (finish === null || seed === null) return '';
    var delta = finish - seed, absD = Math.abs(delta);
    var h = absD % 100, s = Math.floor(absD / 100) % 60, mp = Math.floor(absD / 6000);
    var sign = delta < 0 ? '-' : '+';
    var text = mp ? (sign+mp+':'+('0'+s).slice(-2)+'.'+('0'+h).slice(-2))
                  : (sign+s+'.'+('0'+h).slice(-2));
    return '<span class="'+(delta < 0 ? 'delta-better' : 'delta-worse')+'">'+text+'</span>';
}
function clear_deltas() {
    [1,2,3,4,5,6,7,8].forEach(function(i){ document.getElementById('lane_delta'+i).innerHTML=''; });
}

function highlight_podium() {
    var by_place = {};
    document.querySelectorAll('[id^="lane_place"]').forEach(function(el) {
        var place = parseInt(el.textContent.trim());
        if (place >= 1 && place <= 3) by_place[place] = el.parentElement;
    });
    var delays = {1: 0, 2: 400, 3: 800};
    [1, 2, 3].forEach(function(place) {
        var row = by_place[place];
        if (!row) return;
        row.classList.remove('podium-gold', 'podium-silver', 'podium-bronze');
        var cls = place === 1 ? 'podium-gold' : place === 2 ? 'podium-silver' : 'podium-bronze';
        setTimeout(function() { row.classList.add(cls); }, delays[place]);
    });
}
function clear_podium(){
    document.querySelectorAll('.podium-gold,.podium-silver,.podium-bronze').forEach(function(el){
        el.classList.remove('podium-gold','podium-silver','podium-bronze');
    });
}

function set_col_transform(val, instant) {
    var els = [
        document.getElementById('place-column'),
        document.getElementById('time-column'),
        document.getElementById('delta-column')
    ].concat(Array.from(document.querySelectorAll('.td_time, .td_delta, [id^="lane_place"]')));
    if (instant) {
        els.forEach(function(el) { if (el) { el.style.transition = 'none'; el.style.transform = val; } });
        void document.getElementById('place-column').offsetWidth;
        els.forEach(function(el) { if (el) el.style.transition = ''; });
    } else {
        els.forEach(function(el) { if (el) el.style.transform = val; });
    }
}

function set_header_mode(active) {
    document.getElementById('header_meet_title_wrap').style.display = active ? 'none' : '';
    document.getElementById('header_event_cell').style.display      = active ? ''     : 'none';
    document.getElementById('header_heat_cell').style.display       = active ? ''     : 'none';
    document.getElementById('header_name_cell').style.display       = active ? ''     : 'none';
}

function mode_to_splash() {
    set_header_mode(false);
    clear_podium();
    clear_deltas();
    set_col_transform('', true);
    var _pc = document.getElementById('place-column');
    var _tc = document.getElementById('time-column');
    var _dc = document.getElementById('delta-column');
    _pc.classList.remove('timing-anim'); _tc.classList.remove('timing-anim'); _dc.classList.remove('timing-anim');
    _pc.style.width = '0'; _pc.style.maxWidth = '0';
    _tc.style.width = '0'; _tc.style.maxWidth = '0';
    _dc.style.width = '0'; _dc.style.maxWidth = '0';
    setTimeout(function() {
        document.getElementById('scoreboard').style.opacity = 0;
        _pc.classList.add('timing-anim'); _tc.classList.add('timing-anim'); _dc.classList.add('timing-anim');
    }, 50);
}
function mode_to_intro() {
    set_header_mode(true);
    clear_podium();
    clear_deltas();
    set_col_transform('translateX(30vw)', false);
    document.getElementById('place-column').style.width = '0';
    document.getElementById('place-column').style.maxWidth = '0';
    document.getElementById('time-column').style.width = '0';
    document.getElementById('time-column').style.maxWidth = '0';
    document.getElementById('delta-column').style.width = '0';
    document.getElementById('delta-column').style.maxWidth = '0';
    document.getElementById('scoreboard').style.opacity = 1;
}
function mode_to_running() {
    set_header_mode(true);
    clear_podium();
    set_col_transform('', true);
    var _pc = document.getElementById('place-column');
    var _tc = document.getElementById('time-column');
    var _dc = document.getElementById('delta-column');
    _pc.classList.remove('timing-anim'); _tc.classList.remove('timing-anim'); _dc.classList.remove('timing-anim');
    void _pc.offsetWidth;
    _pc.classList.add('timing-anim'); _tc.classList.add('timing-anim'); _dc.classList.add('timing-anim');
    _pc.style.width = '6vw';  _pc.style.maxWidth = '6vw';
    _tc.style.width = '17vw'; _tc.style.maxWidth = '17vw';
    _dc.style.width = '9vw';  _dc.style.maxWidth = '9vw';
    _tc.innerHTML = 'TEMPS';
    document.getElementById('scoreboard').style.opacity = 1;
}
function mode_to_results() {
    set_header_mode(true);
    document.getElementById('place-column').style.width = '6vw';
    document.getElementById('place-column').style.maxWidth = '6vw';
    document.getElementById('time-column').style.width = '17vw';
    document.getElementById('time-column').style.maxWidth = '17vw';
    document.getElementById('time-column').innerHTML = 'TEMPS';
    document.getElementById('delta-column').style.width = '9vw';
    document.getElementById('delta-column').style.maxWidth = '9vw';
    document.getElementById('scoreboard').style.opacity = 1;
    highlight_podium();
}

// Running time simulation
var start_ms, finished = {}, run_interval;
var FINISH_DELAYS = [0.5,1.2,1.8,2.4,3.0,3.6,4.2,5.0];

function start_running_sim() {
    finished = {};
    clear_deltas();
    [1,2,3,4,5,6,7,8].forEach(function(i){
        document.getElementById('lane_place'+i).textContent='';
        var tel=document.getElementById('lane_time'+i);
        tel.textContent='';
        tel.classList.remove('time-locked');
        void tel.offsetWidth;
        tel.classList.add('time-running');
    });
    start_ms = Date.now();
    FINISH_ORDER.forEach(function(lane,i){
        setTimeout(function(){
            finished[lane]=true;
            var tel=document.getElementById('lane_time'+lane);
            tel.textContent=FINISH_TIMES[lane];
            tel.classList.remove('time-running');
            tel.classList.remove('time-locked');
            void tel.offsetWidth;
            tel.classList.add('time-locked');
            document.getElementById('lane_place'+lane).textContent=PLACES[lane];
            document.getElementById('lane_delta'+lane).innerHTML=formatDelta(FINISH_TIMES[lane],SEED_TIMES[lane]);
        }, FINISH_DELAYS[i]*1000);
    });
    run_interval = setInterval(function(){
        var e=(Date.now()-start_ms)/1000;
        var mm=Math.floor(e/60), ss=Math.floor(e%60), cs=Math.floor((e%1)*100);
        var clk=mm+':'+('0'+ss).slice(-2)+'.'+('0'+cs).slice(-2);
        [1,2,3,4,5,6,7,8].forEach(function(i){
            if (!finished[i]) document.getElementById('lane_time'+i).textContent=clk;
        });
        if (Object.keys(finished).length===8) clearInterval(run_interval);
    }, 50);
}

// Clock
function update_clock(){
    var d=new Date();
    var h=('0'+d.getHours()).slice(-2), m=('0'+d.getMinutes()).slice(-2);
    document.getElementById('meet_datetime').textContent=h+':'+m;
}
update_clock();
setInterval(update_clock,30000);

// Auto-cycle
var step=0;
var steps=[
    {dur:2000, fn:mode_to_splash},
    {dur:3000, fn:mode_to_intro},
    {dur:7000, fn:function(){ mode_to_running(); start_running_sim(); }},
    {dur:5000, fn:mode_to_results},
];
function run_step(){
    steps[step%steps.length].fn();
    setTimeout(function(){ step++; run_step(); }, steps[step%steps.length].dur);
}
run_step();
</script>
</body>
</html>
