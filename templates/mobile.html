<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tremplin">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" sizes="180x180" href="/home_icon">
    <link rel="manifest" href="/manifest.json">
    <title>Tremplin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
        }

        iframe {
            position: fixed;
            top: env(safe-area-inset-top); left: 0;
            width: 100%;
            height: calc(100% - 56px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            border: none;
            display: none;
        }
        iframe.active { display: block; }

        /* ── Tab bar ── */
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(56px + env(safe-area-inset-bottom));
            display: flex;
            background: #111;
            border-top: 1px solid #333;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
        }

        nav button {
            flex: 1;
            background: none;
            border: none;
            color: #666;
            font-size: 15px;
            font-family: -apple-system, sans-serif;
            cursor: pointer;
            transition: color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        nav button.active {
            color: #fff;
            border-top: 2px solid #fff;
            margin-top: -1px;
        }

        /* ── Edge swipe zones (on top of iframes, sides only) ── */
        .edge {
            position: fixed;
            top: env(safe-area-inset-top);
            width: 28px;
            height: calc(100% - 56px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            z-index: 10;
        }
        .edge-left  { left: 0; }
        .edge-right { right: 0; }

        /* Phone portrait */
        @media (orientation: portrait) and (max-width: 480px) {
            nav button {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                font-size: 10px;
            }
            nav button img { margin-right: 0 !important; }
            .tab-label { display: block; }
        }

        /* Phone landscape */
        @media (orientation: landscape) and (max-height: 480px) {
            .tab-label { display: none; }
            nav button img { margin-right: 0 !important; }
            iframe {
                left: env(safe-area-inset-left);
                width: calc(100% - env(safe-area-inset-left) - env(safe-area-inset-right));
            }
            .edge-left  { left:  env(safe-area-inset-left); }
            .edge-right { right: env(safe-area-inset-right); }
        }

        /* ── Add to Home Screen hint (Safari only, non-standalone) ── */
        #a2hs-hint {
            position: fixed;
            bottom: calc(56px + env(safe-area-inset-bottom) + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.95);
            color: #fff;
            font-family: -apple-system, sans-serif;
            font-size: 13px;
            padding: 10px 16px;
            border-radius: 10px;
            white-space: nowrap;
            z-index: 100;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        #a2hs-hint button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
    </style>
</head>
<body>

    <iframe id="frame0" class="active" src="/live-mobile"></iframe>
    <iframe id="frame1"               src="/results"></iframe>
    <iframe id="frame2"               src="/schedule"></iframe>

    <!-- Edge strips intercept horizontal swipes without blocking iframe content -->
    <div class="edge edge-left"  id="edgeL"></div>
    <div class="edge edge-right" id="edgeR"></div>

    <!-- Add to Home Screen hint -->
    <div id="a2hs-hint">
        {{ t.a2hs_tap or 'Tap' }} &#9083; {{ t.a2hs_then or 'then' }} <strong>{{ t.a2hs_action or 'Add to Home Screen' }}</strong> {{ t.a2hs_suffix or 'for full screen' }}
        <button onclick="dismissA2HS()">✕</button>
    </div>

    <nav>
        <button class="active" id="tab0" onclick="show(0)"><img src="/static/icons/swimming.svg" style="width:22px;height:22px;filter:invert(1);vertical-align:middle;margin-right:5px;"><span class="tab-label">{{ t.scoreboard or 'Scoreboard' }}</span></button>
        <button            id="tab1" onclick="show(1)"><img src="/static/icons/award.svg" style="width:22px;height:22px;filter:invert(1);vertical-align:middle;margin-right:5px;"><span class="tab-label">{{ t.results or 'Results' }}</span></button>
        <button            id="tab2" onclick="show(2)"><img src="/static/icons/clipboard-list.svg" style="width:22px;height:22px;filter:invert(1);vertical-align:middle;margin-right:5px;"><span class="tab-label">{{ t.schedule or 'Schedule' }}</span></button>
    </nav>

    <script>
        // Show Add-to-Home-Screen hint on iOS Safari (not in standalone mode, not dismissed before)
        var isIOS        = /iphone|ipad|ipod/i.test(navigator.userAgent);
        var isStandalone = window.navigator.standalone === true;
        var dismissed    = localStorage.getItem('a2hs_dismissed');
        if (isIOS && !isStandalone && !dismissed) {
            var hint = document.getElementById('a2hs-hint');
            hint.style.display = 'flex';
            setTimeout(function() { hint.style.display = 'none'; }, 8000);
        }
        function dismissA2HS() {
            document.getElementById('a2hs-hint').style.display = 'none';
            localStorage.setItem('a2hs_dismissed', '1');
        }

        const frames = [0,1,2].map(i => document.getElementById('frame' + i));
        const tabs   = [0,1,2].map(i => document.getElementById('tab'   + i));
        let current = 0;

        function show(idx) {
            if (idx === current) return;
            frames[current].classList.remove('active');
            tabs[current].classList.remove('active');
            current = idx;
            frames[current].classList.add('active');
            tabs[current].classList.add('active');
            // Let the newly-visible iframe re-run any layout that fired while hidden
            try { frames[current].contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
        }

        // Swipe detection on edge strips
        let swipeStartX = null;

        function onTouchStart(e) { swipeStartX = e.touches[0].clientX; }
        function onTouchEnd(e) {
            if (swipeStartX === null) return;
            const dx = e.changedTouches[0].clientX - swipeStartX;
            swipeStartX = null;
            if (Math.abs(dx) < 40) return;
            show(dx < 0 ? Math.min(current + 1, frames.length - 1)
                        : Math.max(current - 1, 0));
        }

        ['edgeL', 'edgeR'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', onTouchStart, { passive: true });
            el.addEventListener('touchend',   onTouchEnd,   { passive: true });
        });
    </script>
</body>
</html>
