<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tremplin — Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-title {
            font-size: 1.25em;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.02em;
        }
        .logo-sub {
            font-size: 0.8em;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 7px;
            color: #e0e0e0;
            font-size: 1em;
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #555;
        }

        .error {
            background: #2a1a1a;
            border: 1px solid #5c2020;
            border-radius: 7px;
            color: #e07070;
            font-size: 0.85em;
            padding: 9px 14px;
            margin-bottom: 18px;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 11px;
            background: #ffffff;
            color: #111;
            border: none;
            border-radius: 7px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-title">Tremplin</div>
            <div class="logo-sub">Admin</div>
        </div>

        {% if login_failed %}
        <div class="error">Incorrect username or password.</div>
        {% endif %}

        <form method="post">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password">
            </div>
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
