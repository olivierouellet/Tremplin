<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{ meet_name or t.schedule or 'Schedule' }}</title>
    <style>
        @font-face { font-family: 'Overpass Mono';   font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/OverpassMono-Regular.woff2')   format('woff2'); }
        @font-face { font-family: 'DSEG7Classic';    font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/DSEG7Classic-Regular.woff2')    format('woff2'); }
        @font-face { font-family: 'DSEG14Classic';   font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/DSEG14Classic-Regular.woff2')   format('woff2'); }
        @font-face { font-family: 'Share Tech Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/ShareTechMono-Regular.woff2')   format('woff2'); }
        @font-face { font-family: 'Orbitron';        font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/Orbitron-Regular.woff2')        format('woff2'); }
        @font-face { font-family: 'Roboto Mono';     font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/RobotoMono-Regular.woff2')      format('woff2'); }

        :root {
            --color-bg:            {{ theme_colors.bg }};
            --color-header-bg:     {{ theme_colors.header_bg }};
            --color-header-border: {{ theme_colors.header_border }};
            --color-header-label:  {{ theme_colors.header_label }};
            --color-header-value:  {{ theme_colors.header_value }};
            --color-th-text:       {{ theme_colors.th_text }};
            --color-th-bg:         {{ theme_colors.th_bg }};
            --color-row-odd:       {{ theme_colors.row_odd }};
            --color-row-even:      {{ theme_colors.row_even }};
            --color-row-text:      {{ theme_colors.row_text }};
            --color-time:          {{ theme_colors.time }};
            --color-schedule-event: {{ theme_colors.get('schedule_event', '#3b9eff') }};
            --color-schedule-time:  {{ theme_colors.get('schedule_time', '#FFD700') }};
            --color-schedule-name:  {{ theme_colors.get('schedule_name', '#e0e0e0') }};
            --color-schedule-club:  {{ theme_colors.get('schedule_club', '#666666') }};
            --font-family:         '{{ theme_fonts.family }}', monospace;
            --font-digits:         '{{ theme_fonts.digits }}', monospace;
            --font-timing:         '{{ theme_fonts.timing }}', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--color-bg);
            color: var(--color-row-text);
            font-family: var(--font-family);
            padding-top: 65px;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        /* ── Top bar ── */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 65px;
            background: var(--color-header-bg);
            border-bottom: 1px solid var(--color-header-border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            z-index: 100;
        }
        #top-title {
            flex: 1;
            font-size: 0.85em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-header-label);
        }
        #filter-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--color-th-bg);
            border: 1px solid var(--color-header-border);
            color: var(--color-header-value);
            padding: 7px 13px;
            border-radius: 6px;
            font-family: var(--font-family);
            font-size: 0.85em;
            cursor: pointer;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        #filter-btn:active { opacity: 0.7; }
        #filter-count {
            background: var(--color-schedule-event);
            color: #000;
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 0.8em;
            font-weight: bold;
            min-width: 18px;
            text-align: center;
        }
        #filter-count.hidden { display: none; }

        /* ── Filter overlay (full screen) ── */
        #filter-overlay {
            position: fixed;
            inset: 0;
            background: var(--color-bg);
            z-index: 200;
            display: flex;
            flex-direction: column;
        }
        #filter-overlay.hidden { display: none; }

        /*
         * Layout constraint: the parent mobile.html has a pull-to-refresh overlay
         * (#edgeT) at top: 0, left: 0, right: 110px,
         * height: calc(65px + env(safe-area-inset-top)).
         * Since this iframe starts at env(safe-area-inset-top), the overlay covers
         * exactly the top 65px of the iframe's coordinate space.
         *
         * Rules:
         *   • #filter-btn must stay within the rightmost 110px → it does (end of #top-bar).
         *   • Row 1 of #filter-header is 65px — a spacer matching the overlay depth.
         *     Only non-interactive content (the title) lives there.
         *   • The search input, the ✓ close button, and all buttons below the search box
         *     live in row 2 or further — safely below the overlay.
         *
         * If you change the header height (65px) or right offset (110px) in mobile.html,
         * update grid-template-rows here and the filter-btn's position accordingly.
         */
        #filter-header {
            display: grid;
            grid-template-rows: 65px auto;
            padding: 0 12px 10px;
            background: var(--color-header-bg);
            border-bottom: 1px solid var(--color-header-border);
            flex-shrink: 0;
        }
        #filter-title {
            grid-row: 1;
            align-self: center; /* match #top-bar's align-items: center */
            max-width: calc(100% - 110px); /* match #top-title width (filter-btn occupies ~110px) */
            word-break: break-word;
            font-size: 0.85em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-header-label);
        }
        #filter-search-row {
            grid-row: 2;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #search-input {
            flex: 1;
            background: var(--color-bg);
            border: 1px solid var(--color-header-border);
            color: var(--color-row-text);
            padding: 9px 12px;
            border-radius: 6px;
            font-family: var(--font-family);
            font-size: 1em;
            min-width: 0;
        }
        #search-input::placeholder { color: var(--color-schedule-club); }
        #search-input:focus { outline: 1px solid var(--color-schedule-event); border-color: var(--color-schedule-event); }
        #close-filter-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            color: #4caf50;
            font-size: 1.6em;
            cursor: pointer;
            padding: 2px 6px;
            line-height: 1;
        }
        #close-filter-btn:active { opacity: 0.6; }

        /* ── Active filter chips ── */
        #chips-section {
            padding: 8px 12px;
            border-bottom: 1px solid var(--color-header-border);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            min-height: 46px;
        }
        #chips-section:empty::before {
            content: 'Aucun filtre actif';
            color: var(--color-schedule-club);
            font-size: 0.82em;
            font-style: italic;
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 8px 5px 10px;
            border-radius: 20px;
            font-size: 0.82em;
            cursor: pointer;
            border: none;
            font-family: var(--font-family);
        }
        .filter-chip.type-swimmer { background: #1a3a5c; color: #7ec8f5; }
        .filter-chip.type-club    { background: #3a2800; color: #f5c040; }
        .filter-chip:active { opacity: 0.7; }
        .chip-remove { opacity: 0.65; font-size: 1.1em; line-height: 1; }

        /* ── Upcoming toggle ── */
        #upcoming-row {
            padding: 6px 12px;
            border-bottom: 1px solid var(--color-header-border);
            flex-shrink: 0;
            display: flex;
            gap: 8px;
        }
        #btn-upcoming, #btn-all-heats {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.82em;
            cursor: pointer;
            border: 1px solid var(--color-header-border);
            background: none;
            color: var(--color-schedule-club);
            font-family: var(--font-family);
        }
        #btn-upcoming.active, #btn-all-heats.active {
            background: #1a3d1a;
            border-color: #4caf50;
            color: #4caf50;
        }
        #btn-upcoming:active, #btn-all-heats:active { opacity: 0.7; }
        #reset-row {
            padding: 10px 12px;
            border-top: 1px solid var(--color-header-border);
            display: flex;
            justify-content: center;
        }
        #btn-reset {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.82em;
            cursor: pointer;
            border: 1px solid var(--color-header-border);
            background: none;
            color: var(--color-schedule-club);
            font-family: var(--font-family);
        }
        #btn-reset:active { opacity: 0.7; }

        /* ── Suggestions ── */
        #suggestions {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #no-suggestions {
            padding: 24px;
            text-align: center;
            color: var(--color-schedule-club);
            font-size: 0.9em;
            font-style: italic;
        }
        #no-suggestions.hidden { display: none; }
        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 13px 16px;
            gap: 10px;
            border-bottom: 1px solid var(--color-header-border);
            cursor: pointer;
            background: var(--color-bg);
            user-select: none;
        }
        .suggestion-item:active { background: var(--color-header-bg); }
        .sug-type {
            font-size: 0.68em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 5px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .sug-type.swimmer { background: #1a3a5c; color: #7ec8f5; }
        .sug-type.club    { background: #3a2800; color: #f5c040; }
        .sug-name {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--color-row-text);
        }
        .sug-club {
            color: var(--color-schedule-club);
            font-size: 0.82em;
            flex-shrink: 0;
        }
        .suggestion-item.already-added .sug-name { opacity: 0.45; }
        .sug-check { color: var(--color-schedule-event); font-size: 1em; flex-shrink: 0; }

        /* ── Single-column schedule ── */
        #schedule { display: block; }


        .heat-card {
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-header-border);
        }
        .heat-card.heat-odd  { background: var(--color-row-odd); }
        .heat-card.heat-even { background: var(--color-row-even); }
        .heat-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            border-bottom: 1px solid var(--color-header-border);
            padding: 5px 10px;
        }
        .heat-title {
            font-size: 0.82em;
            color: var(--color-schedule-event);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }
        .heat-time {
            color: var(--color-schedule-time);
            font-size: 1em;
            font-family: var(--font-timing), monospace;
            flex-shrink: 0;
        }
        .heat-name {
            font-size: 0.95em;
            color: var(--color-header-value);
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .swimmer-row {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            gap: 6px;
            border-bottom: 1px solid var(--color-header-border);
            font-size: 0.9em;
        }
        .swimmer-row:last-child { border-bottom: none; }
        .lane-num {
            width: 1.6em;
            text-align: center;
            color: var(--color-th-text);
            flex-shrink: 0;
            font-size: 0.85em;
        }
        .swimmer-name {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--color-schedule-name);
        }
        .swimmer-club {
            color: var(--color-schedule-club);
            white-space: nowrap;
            flex-shrink: 0;
            padding-left: 0.5em;
            font-size: 0.85em;
        }
        .seed-time {
            color: var(--color-schedule-time);
            font-family: var(--font-timing), monospace;
            font-size: 0.85em;
            flex-shrink: 0;
            padding-left: 0.4em;
        }

        /* ── Current heat highlight ── */
        .heat-card.heat-current .heat-header { background: var(--color-header-border); }
        .heat-card.heat-current { outline: 2px solid var(--color-time); outline-offset: -2px; }
        .heat-card { scroll-margin-top: 70px; }

        /* ── Empty states ── */
        #waiting {
            height: calc(100vh - 65px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-th-text);
            font-size: 1.4em;
        }
        #no-matches {
            padding: 48px 24px;
            text-align: center;
            color: var(--color-schedule-club);
            font-size: 0.95em;
        }
        #no-matches.hidden { display: none; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="top-title">{{ meet_name or t.schedule or 'Schedule' }}</div>
    <button id="filter-btn" onclick="openFilter()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
            <line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
        Filtrer
        <span id="filter-count" class="hidden">0</span>
    </button>
</div>

{% if not has_meet %}
<div id="waiting">{{ labels.no_schedule or t.no_meet or 'Aucune compétition chargée' }}</div>
{% else %}

<!-- Filter overlay -->
<div id="filter-overlay" class="hidden">
    <div id="filter-header">
        <span id="filter-title">{{ meet_name or t.schedule or 'Schedule' }}</span>
        <div id="filter-search-row">
            <input id="search-input" type="search"
                   placeholder="{{ t.search_placeholder or 'Add a swimmer or a club…' }}"
                   autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                   oninput="onSearchInput()">
            <button id="close-filter-btn" onclick="closeFilter()">✓</button>
        </div>
    </div>
    <div id="upcoming-row">
        <button id="btn-upcoming" onclick="toggleUpcoming()">{{ t.upcoming_only or 'Upcoming' }}</button>
        <button id="btn-all-heats" onclick="toggleAllHeats()">☰ {{ t.show_all_heats or 'All heats' }}</button>
    </div>
    <div id="chips-section"></div>
    <div id="no-suggestions" class="hidden">Aucun résultat</div>
    <div id="suggestions"></div>
    <div id="reset-row">
        <button id="btn-reset" onclick="resetFilters()" data-confirm="{{ t.reset_confirm or 'Clear all filters?' }}">↺ {{ t.reset_filters or 'Reset' }}</button>
    </div>
</div>

<!-- Schedule content -->
<div id="schedule"></div>
<div id="no-matches" class="hidden">Aucun nageur trouvé pour ces filtres</div>

<script>
const MEET_ID = '{{ meet_id }}';
const HEATS   = {{ heats_json | safe }};
const LABELS  = {{ labels | tojson }};

// Random per-device id for anonymous attendance counting (opt-in, admin side).
function tremplinVid() {
    try {
        var k = 'tremplin_vid', v = localStorage.getItem(k);
        if (!v) {
            v = (window.crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : 'v' + Date.now() + Math.random().toString(36).slice(2);
            localStorage.setItem(k, v);
        }
        return v;
    } catch (e) { return ''; }
}

var activeFilters = [];
var _searchTimer  = null;
var currentEvent  = null;
var currentHeat   = null;
var needsScroll   = true;
var upcomingOnly  = false;
var showAllHeats  = false;

function esc(s) {
    return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function laneMatches(lane) {
    if (activeFilters.length === 0) return true;
    for (var i = 0; i < activeFilters.length; i++) {
        var f = activeFilters[i];
        if (f.type === 'club' && lane.club === f.name) return true;
        if (f.type === 'swimmer') {
            if (lane.name === f.name) return true;
            if (lane.swimmers) {
                for (var j = 0; j < lane.swimmers.length; j++) {
                    if (lane.swimmers[j].name === f.name) return true;
                }
            }
        }
    }
    return false;
}

function filterExists(type, name) {
    return activeFilters.some(function(f) { return f.type === type && f.name === name; });
}

function renderSchedule() {
    var hasFilters = activeFilters.length > 0;
    var html = '';
    var matchCount = 0;
    var heatIndex = 0;
    var currentHeatIdx = -1;
    if (upcomingOnly && currentEvent !== null && currentHeat !== null) {
        for (var k = 0; k < HEATS.length; k++) {
            if (String(HEATS[k].event) === currentEvent && String(HEATS[k].heat) === currentHeat) {
                currentHeatIdx = k;
                break;
            }
        }
    }
    for (var i = 0; i < HEATS.length; i++) {
        var h = HEATS[i];
        if (upcomingOnly && currentHeatIdx >= 0 && i < currentHeatIdx) continue;
        var visibleLanes = hasFilters ? h.lanes.filter(laneMatches) : h.lanes;
        if (hasFilters && !showAllHeats && visibleLanes.length === 0) continue;
        matchCount++;
        var evStr = String(h.event);
        var htStr = String(h.heat);
        var isCurrent = evStr === currentEvent && htStr === currentHeat;
        var heatClass = (heatIndex % 2 === 0) ? 'heat-even' : 'heat-odd';
        heatIndex++;
        html += '<div class="heat-card ' + heatClass + (isCurrent ? ' heat-current' : '') +
                '" data-event="' + esc(evStr) + '" data-heat="' + esc(htStr) + '">';
        html += '<div class="heat-header">';
        if (h.time) html += '<span class="heat-time">' + esc(h.time) + '</span>';
        html += '<span class="heat-title">' +
                esc(LABELS.event) + ' ' + esc(evStr) + ' — ' +
                esc(LABELS.heat)  + ' ' + esc(htStr) + '</span>';
        if (h.event_name) html += '<span class="heat-name">' + esc(h.event_name) + '</span>';
        html += '</div><div class="swimmer-list">';
        for (var j = 0; j < visibleLanes.length; j++) {
            var lane = visibleLanes[j];
            var displayName;
            if (lane.swimmers && lane.swimmers.length > 0) {
                var firsts = lane.swimmers.map(function(s) { return s.first || s.name; }).filter(Boolean);
                displayName = firsts.join(' · ') || lane.name || '—';
            } else {
                displayName = lane.name || '—';
            }
            html += '<div class="swimmer-row">';
            html += '<div class="lane-num">' + esc(lane.lane) + '</div>';
            html += '<div class="swimmer-name">' + esc(displayName) + '</div>';
            if (lane.club)      html += '<span class="swimmer-club">'  + esc(lane.club)      + '</span>';
            if (lane.seed_time) html += '<span class="seed-time">'     + esc(lane.seed_time) + '</span>';
            html += '</div>';
        }
        html += '</div></div>';
    }
    document.getElementById('schedule').innerHTML = html;
    document.getElementById('no-matches').classList.toggle('hidden', matchCount > 0 || !hasFilters);
    highlight();
}

function renderChips() {
    var html = '';
    for (var i = 0; i < activeFilters.length; i++) {
        var f = activeFilters[i];
        html += '<button class="filter-chip type-' + esc(f.type) + '"' +
                ' data-type="' + esc(f.type) + '" data-name="' + esc(f.name) + '">' +
                esc(f.name) + ' <span class="chip-remove">×</span></button>';
    }
    document.getElementById('chips-section').innerHTML = html;
    var count = activeFilters.length;
    var countEl = document.getElementById('filter-count');
    countEl.textContent = count;
    countEl.classList.toggle('hidden', count === 0);
}

document.getElementById('chips-section').addEventListener('click', function(e) {
    var chip = e.target.closest('.filter-chip');
    if (!chip) return;
    activeFilters = activeFilters.filter(function(f) {
        return !(f.type === chip.dataset.type && f.name === chip.dataset.name);
    });
    renderChips();
    renderSchedule();
});

function addFilter(type, name) {
    if (!filterExists(type, name)) {
        activeFilters.push({ type: type, name: name });
        renderChips();
        renderSchedule();
    }
    var inp = document.getElementById('search-input');
    inp.value = '';
    renderSuggestions([]);
    inp.focus();
}

function toggleUpcoming() {
    upcomingOnly = !upcomingOnly;
    document.getElementById('btn-upcoming').classList.toggle('active', upcomingOnly);
    renderSchedule();
}
function toggleAllHeats() {
    showAllHeats = !showAllHeats;
    document.getElementById('btn-all-heats').classList.toggle('active', showAllHeats);
    renderSchedule();
}
function resetFilters() {
    if (!confirm(document.getElementById('btn-reset').dataset.confirm)) return;
    activeFilters = [];
    upcomingOnly  = false;
    showAllHeats  = false;
    document.getElementById('btn-upcoming').classList.remove('active');
    document.getElementById('btn-all-heats').classList.remove('active');
    renderChips();
    renderSchedule();
}

function openFilter() {
    document.getElementById('filter-overlay').classList.remove('hidden');
    renderChips();
    var inp = document.getElementById('search-input');
    inp.value = '';
    renderSuggestions([]);
    setTimeout(function() { inp.focus(); }, 80);
}
function closeFilter() {
    document.getElementById('filter-overlay').classList.add('hidden');
}

function onSearchInput() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(fetchSuggestions, 220);
}
function fetchSuggestions() {
    var q = document.getElementById('search-input').value.trim();
    if (!q) { renderSuggestions([]); return; }
    fetch('/search_suggestions?meet_id=' + encodeURIComponent(MEET_ID) + '&q=' + encodeURIComponent(q))
        .then(function(r) { return r.json(); })
        .then(renderSuggestions)
        .catch(function() {});
}
function renderSuggestions(items) {
    var noEl  = document.getElementById('no-suggestions');
    var sugEl = document.getElementById('suggestions');
    if (!items || items.length === 0) {
        sugEl.innerHTML = '';
        var q = document.getElementById('search-input').value.trim();
        noEl.classList.toggle('hidden', !q);
        return;
    }
    noEl.classList.add('hidden');
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var already = filterExists(it.type, it.name);
        var typeLabel = it.type === 'swimmer' ? 'Nageur' : 'Club';
        html += '<div class="suggestion-item' + (already ? ' already-added' : '') + '"' +
                ' data-type="' + esc(it.type) + '" data-name="' + esc(it.name) + '">';
        html += '<span class="sug-type ' + esc(it.type) + '">' + typeLabel + '</span>';
        html += '<span class="sug-name">' + esc(it.name) + '</span>';
        if (it.club) html += '<span class="sug-club">' + esc(it.club) + '</span>';
        if (already) html += '<span class="sug-check">✓</span>';
        html += '</div>';
    }
    sugEl.innerHTML = html;
}

document.getElementById('suggestions').addEventListener('click', function(e) {
    var item = e.target.closest('.suggestion-item');
    if (!item) return;
    addFilter(item.dataset.type, item.dataset.name);
    fetchSuggestions();
});

function highlight() {
    var found = null;
    document.querySelectorAll('.heat-card').forEach(function(card) {
        var match = card.dataset.event === currentEvent && card.dataset.heat === currentHeat;
        card.classList.toggle('heat-current', match);
        if (match) found = card;
    });
    if (found && needsScroll) {
        found.scrollIntoView({ behavior: 'smooth', block: 'start' });
        needsScroll = false;
    }
}

document.addEventListener('visibilitychange', function() {
    if (!document.hidden) needsScroll = true;
});

renderSchedule();
</script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
var sockResults    = io('/results');
var sockScoreboard = io('/scoreboard');
var sockSchedule   = io('/schedule');

sockResults.on('connect', function() {
    sockResults.emit('join_meet', { meet_id: MEET_ID, vid: tremplinVid() });
});
sockScoreboard.on('connect', function() {
    sockScoreboard.emit('join_meet', { meet_id: MEET_ID, vid: tremplinVid() });
});
sockSchedule.on('connect', function() {
    sockSchedule.emit('join_meet', { meet_id: MEET_ID, vid: tremplinVid() });
});

sockResults.on('results_snapshot', function(d) {
    currentEvent = String(d.event).trim();
    currentHeat  = String(d.heat).trim();
    highlight();
});
sockScoreboard.on('update_scoreboard', function(d) {
    var changed = false;
    if ('current_event' in d) { currentEvent = String(d.current_event).trim(); changed = true; }
    if ('current_heat'  in d) { currentHeat  = String(d.current_heat).trim();  changed = true; }
    if (changed) highlight();
});
sockSchedule.on('schedule_update', function() {
    location.reload();
});
</script>

{% endif %}
