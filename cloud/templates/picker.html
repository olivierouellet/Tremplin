<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tremplin — {{ t.page_title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px;
        }
        h1 { font-size: 1.4em; font-weight: 400; color: #888; margin-bottom: 32px; letter-spacing: 0.06em; text-transform: uppercase; }
        .meets { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; max-width: 800px; }
        .card {
            background: #1a1a1a; border: 1px solid #2e2e2e; border-radius: 10px;
            padding: 24px 28px; min-width: 260px; max-width: 340px; flex: 1;
            text-decoration: none; color: inherit;
            transition: border-color 0.15s, background 0.15s;
        }
        .card:hover { border-color: #555; background: #222; }
        .card-name { font-size: 1.25em; font-weight: 600; margin-bottom: 6px; }
        .card-meta { font-size: 0.88em; color: #666; line-height: 1.6; }
        .card-meta span + span::before { content: ' · '; }
        .empty { color: #444; font-size: 1.1em; margin-top: 60px; }
    </style>
</head>
<body>
    <h1>{{ t.page_title }}</h1>
    {% if meets %}
    <div class="meets">
        {% for meet in meets %}
        <a class="card" href="/mobile?meet={{ meet.id }}">
            <div class="card-name">{{ meet.name or t.unnamed_meet }}</div>
            <div class="card-meta">
                {% if meet.location %}<span>{{ meet.location }}</span>{% endif %}
                {% if meet.sport %}<span>{{ meet.sport }}</span>{% endif %}
            </div>
        </a>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty">{{ t.no_meets }}</div>
    {% endif %}
</body>
</html>
